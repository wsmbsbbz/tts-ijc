<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Combinator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Translation Combinator</h1>
      <p class="subtitle">上传音频 + 翻译字幕，生成带翻译旁白的音频</p>
    </header>

    <!-- Upload Section -->
    <section id="upload-section" class="card">
      <h2>创建任务</h2>
      <div class="form-group">
        <label for="audio-file">音频文件</label>
        <input type="file" id="audio-file" accept="audio/*">
      </div>
      <div class="form-group">
        <label for="vtt-file">VTT 字幕文件</label>
        <input type="file" id="vtt-file" accept=".vtt">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="tts-provider">TTS 提供方</label>
          <select id="tts-provider">
            <option value="edge" selected>Edge (免费, 推荐)</option>
            <option value="gtts">gTTS (免费)</option>
            <option value="azure">Azure</option>
            <option value="openai">OpenAI</option>
            <option value="gcloud">Google Cloud</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tts-volume">TTS 音量: <span id="volume-value">0.08</span></label>
          <input type="range" id="tts-volume" min="0" max="0.3" step="0.01" value="0.08">
        </div>
      </div>
      <button id="submit-btn" class="btn-primary" disabled>开始处理</button>
      <div id="upload-progress" class="progress-bar" hidden>
        <div class="progress-fill"></div>
        <span class="progress-text">上传中...</span>
      </div>
    </section>

    <!-- Job Status Section -->
    <section id="job-section" class="card" hidden>
      <h2>任务状态</h2>
      <div id="job-status" class="status-container">
        <div class="status-badge queued">排队中</div>
        <p id="job-progress" class="progress-text"></p>
      </div>
      <a id="download-link" class="btn-primary" hidden download>下载结果</a>
      <button id="new-job-btn" class="btn-secondary" hidden>创建新任务</button>
    </section>

    <!-- Recent Jobs -->
    <section id="history-section" class="card">
      <h2>最近任务</h2>
      <div id="job-list" class="job-list">
        <p class="empty-state">暂无任务</p>
      </div>
    </section>
  </div>

  <script src="config.local.js"></script>
  <script src="app.js"></script>
</body>
</html>
